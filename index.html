<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AYNAWI Foreign Employment Agent</title>
    <style>
        /* Global Styles & Variables */
        :root {
            --primary-purple: #7B2CBF;
            --dark-purple: #4A148C;
            --silver-main: #C0C0C0; /* Muted central silver */
            --silver-light: #E5E4E2; /* Base background sheen */
            --silver-dark: #A9A9A9; /* Darker structural silver borders */
            --card-darker-white: #DBDBDB; /* Adjusted brighter white down to dark silver-white */
            --section-darker-white: #D1D0CE; /* Adjusted section white down to deep metallic platinum */
            --text-dark: #1C2833;
            --text-muted: #4D5656;
            --border-color: #95A5A6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--silver-main);
            background: linear-gradient(135deg, var(--silver-light) 0%, var(--silver-main) 100%);
            color: var(--text-dark);
            line-height: 1.6;
            overflow-x: hidden;
        }

        .container {
            width: 90%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px 0;
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes floatEffect {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }

        /* Merged & Unified Navigation Header */
        header {
            background: rgba(209, 208, 206, 0.45); /* Muted tint that blends instantly into the layout background */
            backdrop-filter: blur(12px); /* Blurred backdrop glassmorphism effect for code seamlessness */
            -webkit-backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: none; /* Removed harsh separating border lines */
            box-shadow: none; /* Removed separating shadows to merge directly with layout content */
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%; /* Aligned closely with page sections padding */
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-box {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: linear-gradient(135deg, var(--primary-purple), var(--dark-purple));
            box-shadow: 0 4px 10px rgba(74, 20, 140, 0.3);
            transition: transform 0.3s ease;
        }

        .logo-box:hover {
            transform: scale(1.05) rotate(5deg);
        }

        .logo-box svg {
            width: 85%;
            height: 85%;
        }

        .brand-name h1 {
            font-size: 1.3rem;
            color: var(--dark-purple);
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 0.5px;
        }

        .brand-name p {
            font-size: 0.9rem;
            color: var(--primary-purple);
            font-weight: 600;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 25px;
        }

        nav ul li a {
            text-decoration: none;
            color: var(--text-dark);
            font-weight: 600;
            transition: color 0.3s ease;
        }

        nav ul li a:hover {
            color: var(--primary-purple);
        }

        .btn {
            background: linear-gradient(135deg, var(--primary-purple), var(--dark-purple));
            color: #FFFFFF;
            padding: 12px 24px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            display: inline-block;
            box-shadow: 0 4px 6px rgba(0,0,0,0.15);
        }

        .btn:hover {
            background: var(--dark-purple);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(123, 44, 191, 0.45);
        }

        /* Hero Section - Shifted slightly up to mesh naturally beneath header */
        .hero {
            background: transparent; /* Makes background completely fluid with layout gradients */
            padding: 80px 0 120px 0;
            text-align: center;
            border-bottom: 2px solid var(--border-color);
        }

        .hero h2 {
            font-size: 3.2rem;
            color: var(--dark-purple);
            margin-bottom: 20px;
            font-weight: 800;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.5);
            animation: fadeInUp 0.8s ease-out;
        }

        .hero p {
            font-size: 1.35rem;
            max-width: 850px;
            margin: 0 auto 30px auto;
            color: var(--text-dark);
            font-weight: 600;
            animation: fadeInUp 1s ease-out;
        }

        .badge-box {
            background-color: var(--card-darker-white);
            border-left: 5px solid var(--dark-purple);
            border-right: 1px solid var(--border-color);
            border-top: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
            padding: 18px;
            display: inline-block;
            margin-top: 30px;
            border-radius: 4px 12px 12px 4px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.12);
            text-align: left;
        }

        section {
            padding: 90px 0;
            background-color: var(--silver-light);
        }

        section:nth-of-type(even) {
            background-color: var(--section-darker-white);
        }

        .section-title {
            text-align: center;
            color: var(--dark-purple);
            margin-bottom: 50px;
            font-size: 2.4rem;
            font-weight: 800;
        }
